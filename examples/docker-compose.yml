# Example: MCP (HTTP) + model on a private Docker network.
# Do NOT publish MCP port to the host in production — only the model container should reach it.

services:
  wb-mcp:
    build: ..
    container_name: wb-mcp
    environment:
      WB_API_TOKEN: ${WB_API_TOKEN}
      MCP_TRANSPORT: http
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      READ_ONLY: "true"
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "3000"
      MCP_HTTP_PATH: /mcp
      MCP_ALLOWED_HOSTS: wb-mcp
      MCP_SESSION_IDLE_TTL_MS: "1800000"
      MCP_SESSION_MAX: "32"
    # No host ports — reachable only as http://wb-mcp:3000/mcp on the internal network
    expose:
      - "3000"
    networks:
      - agent-net
    restart: unless-stopped

  # Replace with your model / agent container that speaks MCP Streamable HTTP
  # model:
  #   image: your-model-image
  #   environment:
  #     MCP_URL: http://wb-mcp:3000/mcp
  #     MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
  #   networks:
  #     - agent-net

networks:
  agent-net:
    driver: bridge
